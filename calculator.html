<html lang="en">
<head>

    <title>Calculator</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/tools.css">
</head>
<body>
    <nav class="navbar navbar-default fixed-top">
        <ul class="nav">
            <li class="nav-item"><a class="nav-link" href="index.html"><code>&ltHome&gt</code></a></li>
            <li class="nav-item"><a class="nav-link" href="about.html"><code>&ltAbout&gt</code></a></li>
            <li class="nav-item"><a class="nav-link" href="projects.html"><code>&ltProjects&gt</code></a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html"><code>&ltContact&gt</code></a></li>
            <li class="nav-item"><a class="nav-link" href="#"><code class="theme-switcher">&ltTheme: Dark&gt</code></a></li>
        </ul>
    </nav>

    <div class="calculator">
        <input type="text" class="display" disabled>
        <div class="keys">

          <div class="row1">
            <button value="7">7</button>
            <button value="8">8</button>
            <button value="9">9</button>
            <button value="+" class="operator">+</button>
          </div>

          <div class="row2">
            <button value="4">4</button>
            <button value="5">5</button>
            <button value="6">6</button>
            <button value="-" class="operator">-</button>
          </div>

          <div class="row3">
            <button value="1">1</button>
            <button value="2">2</button>
            <button value="3">3</button>
            <button value="*" class="operator">x</button>
          </div>

          <div class="row4">
            <button value="C" class="operator">C</button>
            <button value="0">0</button>
            <button value="/" class="operator">÷</button>
            <button value="=" class="operator">=</button>
          </div>
        </div>
      </div>

   <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
   <script src="js/tools.js"></script>
   <script src="js/main.js"></script>
</body>
</html>
